{% extends "base.html" %}
{% block title %}Editar Cliente · Maria's Home Service{% endblock %}
{% block page_title %}Editar Cliente{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">

    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('listar_clientes') }}" class="btn btn-sm" style="background:#ede9fe;color:#7c3aed;border-radius:8px;">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div>
        <h5 class="mb-0 fw-bold" style="color:#1e1b4b;">Editar Cliente</h5>
        <small class="text-muted">{{ cliente.nome }}</small>
      </div>
    </div>

    <div class="table-card p-4">
      <form method="post" action="{{ url_for('editar_cliente', id=cliente.id) }}" novalidate>

        <div class="mb-3">
          <label for="nome" class="form-label">Nome Completo <span class="text-danger">*</span></label>
          <input type="text" id="nome" name="nome" class="form-control" value="{{ cliente.nome }}" required>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label for="telefone" class="form-label">Telefone / WhatsApp</label>
            <input type="tel" id="telefone" name="telefone" class="form-control" value="{{ cliente.telefone or '' }}">
          </div>
          <div class="col-sm-6">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ cliente.email or '' }}">
          </div>
        </div>

        <div class="mb-3">
          <label for="endereco" class="form-label">Endereço Completo</label>
          <input type="text" id="endereco" name="endereco" class="form-control" value="{{ cliente.endereco or '' }}">
        </div>

        <div class="mb-4">
          <label for="observacoes" class="form-label">Observações</label>
          <textarea id="observacoes" name="observacoes" class="form-control" rows="3">{{ cliente.observacoes or '' }}</textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-brand">
            <i class="bi bi-check2-circle me-2"></i>Atualizar Cliente
          </button>
          <a href="{{ url_for('listar_clientes') }}" class="btn btn-light" style="border-radius:10px;">Cancelar</a>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
